name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke-test:
    name: Smoke test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Self-test (score the repo's own README)
        run: |
          python3 extract_signals.py --readme-file README.md --snapshot ci > self-score.json
          cat self-score.json
          python3 -c "import json; r=json.load(open('self-score.json')); assert r['total'] >= 0 and r['total'] <= 12, f'total out of range: {r[\"total\"]}'"
          echo "Self-test PASSED"

      - name: Validate methodology.md is parseable
        run: |
          python3 extract_signals.py --readme-file methodology.md --snapshot ci-methodology > /dev/null
          echo "Methodology smoke-test PASSED"

      - name: Schema check on audit_data.csv
        run: |
          python3 - <<'PY'
          import csv
          required_cols = {"id","server","repo","D1_schema","D2_auth","D3_sideeffect","D4_allowlist","D5_audit","D6_versioning","total"}
          with open("audit_data.csv") as f:
              reader = csv.DictReader(f)
              cols = set(reader.fieldnames)
              missing = required_cols - cols
              assert not missing, f"missing columns: {missing}"
              for row in reader:
                  for d in ["D1_schema","D2_auth","D3_sideeffect","D4_allowlist","D5_audit","D6_versioning"]:
                      v = int(row[d])
                      assert 0 <= v <= 2, f"{row['id']} {d}={v} out of range"
                  total = sum(int(row[d]) for d in ["D1_schema","D2_auth","D3_sideeffect","D4_allowlist","D5_audit","D6_versioning"])
                  assert total == int(row["total"]), f"{row['id']} total mismatch: {total} vs {row['total']}"
          print("audit_data.csv schema PASSED")
          PY
